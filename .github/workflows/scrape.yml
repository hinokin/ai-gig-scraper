name: AI案件スクレイピング（CrowdWorks + Lancers）

on:
  schedule:
    - cron: '0 23 * * *'   # 23:00 UTC = 08:00 JST 毎日
  workflow_dispatch:        # 手動実行ボタン

# Actions からのコミット＆プッシュに必要（これが無いと push で落ちる）
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run tests (フィルタロジックの回帰チェック)
        run: |
          python test_filters.py
          python test_pipeline.py

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json seen_urls.json debug_first_card.txt 2>/dev/null || git add results.json seen_urls.json
          git diff --staged --quiet || git commit -m "chore: update jobs $(date +'%Y-%m-%d')"
          git push
